<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة ليكي ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
    overflow-x: hidden;
}

.section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    background: white;
    color: black;
    font-size: 16px;
    cursor: pointer;
    border-radius: 20px;
    transition: 0.3s;
}

button:hover {
    background: #ccc;
}

.hidden {
    display: none;
}

.fade {
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

h1, p {
    max-width: 600px;
}
</style>
</head>

<body>

<!-- 1 -->
<div class="section" id="section1">
    <h1>ممكن تاخدي دقيقة بس؟ ❤️</h1>
    <button onclick="next(2)">اضغطي هنا</button>
</div>

<!-- 2 -->
<div class="section hidden" id="section2">
    <h1>فاكرة أول مرة؟ 🥺</h1>
    <p>أنا لسه فاكر كل حاجة… ضحكتك، كلامك، وكل تفصيلة صغيرة</p>
    <button onclick="next(3)">كملي</button>
</div>

<!-- 3 -->
<div class="section hidden" id="section3">
    <h1>أنا غلطت…</h1>
    <p>ومش بحاول أبرر، بس أنا فعلاً زعلان إني زعلتك 💔</p>
    <button onclick="next(4)">كملي</button>
</div>

<!-- 4 -->
<div class="section hidden" id="section4">
    <h1>بس الحقيقة…</h1>
    <p>أنا بحبك في كل حالاتك، حتى وقت الزعل والخناق ❤️</p>
    <button onclick="next(5)">كملي</button>
</div>

<!-- 5 -->
<div class="section hidden" id="section5">
    <h1>لو لسه هنا…</h1>
    <p>ده معناه إنك لسه مهمة عندك 💖</p>
    <button onclick="next(6)">اضغطي هنا</button>
</div>

<!-- 6 -->
<div class="section hidden" id="section6">
    <h1>ممكن نبدأ من جديد؟ ❤️</h1>
</div>

<script>
function next(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.add('hidden');
    });

    let nextSection = document.getElementById('section' + id);
    nextSection.classList.remove('hidden');
    nextSection.classList.add('fade');
}
</script>

</body>
</html>
